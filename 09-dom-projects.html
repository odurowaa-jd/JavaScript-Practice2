<body>

     <p>YouTube Subscribe Button</p>

      subscribe();

      <p><u><b>Amazon Shipping Calculator</b></u></p>
      <p>Orders under $40 = $10 shipping</p>
      <p>Orders $40 and above = FREE shipping</p>
  <input placeholder="Cost of order" class="js-cost-input" onkeydown="handleCostKeydown(event)">
  <button onclick="
    calculateTotal();
  ">Calculate</button>

  <p class="js-total-cost"></p>




  <script>

                //AMAZON SHIPPING CALCULATOR.
    function handleCostKeydown(event) {

      if (event.key === 'Enter') { 
        // Check if the Enter key was pressed.
        calculateTotal(); 
        // Call the function to calculate the total cost.
      }

    }

    function calculateTotal() {
        const inputElement = document.querySelector('.js-cost-input');
        let cost = Number(inputElement.value); 
        // Convert the input value to a number.

        if (cost < 40) {
          cost = cost +10;
        }

        document.querySelector('.js-total-cost')
        .innerHTML = `Total Cost: $${cost}`;
    }


            //YOUTUBE SUBSCRIBE BUTTON.
    function subscribe() {
       const buttonElement = document.querySelector('.js-subscribe-btn');

  if (buttonElement.innerHTML === 'Subscribe') {
    buttonElement.innerHTML = 'Subscribed!';
    buttonElement.style.backgroundColor = 'azure';
  } else {
    buttonElement.innerHTML = 'Subscribe';
    buttonElement.style.backgroundColor = '';
  }
    }

    console.log('25'-5); // This will convert the string '25' to a number and then subtract 5, resulting in 20. This is an example of type coercion in JavaScript, where the language automatically converts values to the appropriate type for the operation being performed.
    console.log('25' + 5); // This will concatenate the string '25' with the number 5, resulting in '255'. This is because the + operator is used for both addition and string concatenation, and when one of the operands is a string, it performs concatenation instead of addition.
    */

    */
  </script>
