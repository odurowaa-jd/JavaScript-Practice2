<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCK PAPER SCISSORS GAME.</title>
<link rel="stylesheet" href="styles/10-rock-paper-scissors.css">
</head>
<body>

    <p class="title">Rock Paper Scissors</p>
    <button id="rock" onclick="
    playGame('rock');
    " class="move-btn">
    <img class="move-icn"
     src="images\rock-emoji.png" alt="Rock">
    </button>

    
    <button id="paper"
     onclick="
     playGame('paper');
    " class="move-btn">
    <img class="move-icn"
     src="images\paper-emoji.png" alt="Paper">
    </button>


    <button id="scissors"
     onclick="
     playGame('scissors');
    " class="move-btn">
    <img class="move-icn"
     src="images\scissors-emoji.png" alt="Scissors">
    </button>

    <p class="js-results result">You Win!</p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
    score.wins = 0; 
    score.losses = 0; 
    score.ties = 0;
    localStorage.removeItem('score');
    updateScoreElement();
    "
    class="reset-scr-btn">
      Reset Score
    </button>

  <script src="scripts\10-rock-paper-scissors.js"></script>
  </script>
</body>
</html>
